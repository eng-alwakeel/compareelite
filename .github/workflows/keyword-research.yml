name: Weekly Keyword Research

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  keyword-research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run keyword research
        run: node scripts/keyword-research.js
      - name: Commit results
        run: |
          git config user.email "agents@compareelite.com"
          git config user.name "CompareElite Director"
          git add data/target-keywords.json
          git diff --staged --quiet || git commit -m "chore: weekly keywords update $(date +%Y-%m-%d) [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
