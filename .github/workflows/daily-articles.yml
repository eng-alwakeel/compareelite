name: Daily Article Generator

on:
  schedule:
    - cron: '0 5 * * *'   # 8:00 AM KSA (UTC+3)
  workflow_dispatch:        # يدوي عند الحاجة

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config user.name "CompareElite Bot"
          git config user.email "bot@compareelite.com"

      - name: Set remote with token
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Record HEAD before generation
        id: pre
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate 4 daily articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions -p "/daily-articles"

      - name: Identify new article files
        id: diff
        run: |
          NEW=$(git diff --name-only --diff-filter=AM ${{ steps.pre.outputs.sha }} HEAD -- 'articles/*.json' | tr '\n' ' ')
          echo "files=$NEW" >> "$GITHUB_OUTPUT"
          echo "Generated articles: $NEW"

      - name: HARD GATE 1 — Schema validation on new articles
        if: steps.diff.outputs.files != ''
        run: |
          echo "Validating: ${{ steps.diff.outputs.files }}"
          node scripts/validate-article.js ${{ steps.diff.outputs.files }}

      - name: HARD GATE 2 — Amazon link liveness on new articles
        if: steps.diff.outputs.files != ''
        run: |
          for f in ${{ steps.diff.outputs.files }}; do
            slug=$(basename "$f" .json)
            echo "Probing $slug"
            node scripts/validate-amazon-links.js --slug "$slug" --no-md --no-json
          done

      - name: Push (only after both gates pass)
        if: success() && steps.diff.outputs.files != ''
        run: |
          git pull --rebase origin main || true
          git push origin main

      - name: Reject — leave commit unpushed if any gate failed
        if: failure()
        run: |
          echo "::error::One or more hard gates failed. The commit was NOT pushed to main."
          echo "Inspect the failed step above for the offending article(s)."
          git log -1 --stat
          exit 1
