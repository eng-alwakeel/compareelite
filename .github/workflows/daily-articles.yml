name: Daily Article Generator

on:
  schedule:
    - cron: '0 5 * * *'   # 8:00 AM KSA (UTC+3)
  workflow_dispatch:        # يدوي عند الحاجة

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config user.name "CompareElite Bot"
          git config user.email "bot@compareelite.com"

      - name: Set remote with token
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Record HEAD before generation
        id: pre
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate 4 daily articles (with retry)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Retry logic: 3 attempts with exponential backoff
          MAX_ATTEMPTS=3
          ATTEMPT=1
          SUCCESS=false

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Article generation attempt $ATTEMPT of $MAX_ATTEMPTS..."

            if claude --dangerously-skip-permissions -p "/daily-articles"; then
              echo "✅ Article generation succeeded on attempt $ATTEMPT"
              SUCCESS=true
              break
            else
              echo "❌ Article generation failed on attempt $ATTEMPT"

              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                WAIT_TIME=$((2 ** ATTEMPT * 5))  # 10s, 20s exponential backoff
                echo "Waiting ${WAIT_TIME}s before retry..."
                sleep $WAIT_TIME
              fi
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ "$SUCCESS" = false ]; then
            echo "::error::Article generation failed after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Identify new article files
        id: diff
        run: |
          NEW=$(git diff --name-only --diff-filter=AM ${{ steps.pre.outputs.sha }} HEAD -- 'articles/*.json' | tr '\n' ' ')
          echo "files=$NEW" >> "$GITHUB_OUTPUT"
          echo "Generated articles: $NEW"

      - name: HARD GATE 1 — Schema + image liveness on new articles
        if: steps.diff.outputs.files != ''
        run: |
          echo "Validating: ${{ steps.diff.outputs.files }}"
          node scripts/validate-article.js --images ${{ steps.diff.outputs.files }}

      - name: HARD GATE 2 — Amazon link liveness on new articles
        if: steps.diff.outputs.files != ''
        run: |
          for f in ${{ steps.diff.outputs.files }}; do
            slug=$(basename "$f" .json)
            echo "Probing $slug"
            node scripts/validate-amazon-links.js --slug "$slug" --no-md --no-json
          done

      - name: Push (only after both gates pass)
        if: success() && steps.diff.outputs.files != ''
        run: |
          git pull --rebase origin main || true
          git push origin main

      - name: Reject — leave commit unpushed if any gate failed
        if: failure()
        run: |
          echo "::error::One or more hard gates failed. The commit was NOT pushed to main."
          echo "Inspect the failed step above for the offending article(s)."
          git log -1 --stat
          exit 1

      - name: Create failure issue on complete workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Daily article generation failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Daily Article Generation Failure

            **Workflow run**: [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            **Triggered**: ${new Date().toISOString()}
            **Status**: ❌ Failed

            ### Possible causes:
            - Claude API timeout or rate limit
            - Validation gate failure (schema, images, or Amazon links)
            - Network issues
            - Invalid article content generated

            ### Next steps:
            1. Check the workflow logs above for specific errors
            2. Manually trigger workflow if transient failure
            3. Review generated articles if validation failed
            4. Check Claude API status if generation failed

            ---
            *Auto-created by daily-articles workflow*`;

            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['automation', 'daily-articles', 'failure']
              });
              console.log('Created failure tracking issue');
            } catch (error) {
              console.log('Could not create issue (may not have permissions):', error.message);
            }
