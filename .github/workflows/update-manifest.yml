name: Update Articles Manifest

on:
  push:
    branches: [main]
    paths:
      - 'articles/**'

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate articles manifest
        run: |
          node -e "
            const fs = require('fs');
            const articlesDir = 'articles';
            let slugs = [];
            if (fs.existsSync(articlesDir)) {
              slugs = fs.readdirSync(articlesDir)
                .filter(f => f.endsWith('.json') && f !== 'TEMPLATE.json')
                .map(f => f.replace('.json', ''))
                .sort();
            }
            const manifest = { slugs, count: slugs.length, generatedAt: new Date().toISOString() };
            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/articles-manifest.json', JSON.stringify(manifest, null, 2));
            console.log('Manifest updated:', slugs.length, 'articles');
          "

      - name: Regenerate sitemap.xml
        run: node scripts/generate-sitemap.js

      - name: Regenerate articles-index.md
        run: node scripts/generate-articles-index.js

      - name: Regenerate per-article static HTML pages
        run: node scripts/generate-article-pages.js

      - name: Notify IndexNow of changed articles
        run: |
          NEW=$(git diff-tree --no-commit-id --name-only -r --diff-filter=AM HEAD -- 'articles/*.json' \
                | xargs -I{} basename {} .json \
                | grep -v '^TEMPLATE$' \
                | tr '\n' ' ')
          if [ -z "$NEW" ]; then
            echo "No added/modified articles in this commit — skipping IndexNow."
            exit 0
          fi
          echo "Submitting to IndexNow: $NEW"
          node scripts/notify-indexnow.js $NEW

      - name: Configure Git
        run: |
          git config user.name "CompareElite Bot"
          git config user.email "bot@compareelite.com"

      - name: Commit and push manifest + sitemap + index + article pages
        run: |
          git add data/articles-manifest.json data/articles-index.md sitemap.xml blog/article/
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update articles manifest + sitemap + index + per-article pages [skip ci]" && git push origin main)
