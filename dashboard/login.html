<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CompareElite</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            margin-bottom: 1.75rem;
            justify-content: center;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.375rem;
            text-align: center;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-main);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: var(--primary-hover);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .error-msg.show {
            display: block;
        }

        [data-theme="dark"] .error-msg {
            background: rgba(220, 38, 38, 0.1);
            border-color: rgba(220, 38, 38, 0.3);
            color: #fca5a5;
        }

        [data-theme="dark"] .form-input {
            background: var(--bg-main);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="../index.html" class="login-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            CompareElite
        </a>
        <h1 class="login-title">Dashboard Login</h1>
        <p class="login-subtitle">Admin access only</p>

        <div class="error-msg" id="error-msg">Incorrect password. Please try again.</div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input
                    class="form-input"
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                    autofocus
                />
            </div>
            <button class="login-btn" type="submit">Sign In</button>
        </form>
    </div>

    <script src="../js/main.js"></script>
    <script>
        // If already authenticated, redirect to dashboard
        if (sessionStorage.getItem('ce_auth') === 'true') {
            window.location.replace('./index.html');
        }

        // SHA-256 hash of the password — change this when you change your password
        // Current password hash — replace with your own using: https://emn178.github.io/online-tools/sha256.html
        const PASSWORD_HASH = 'e34a9605ecff20d2bd857675239e48afcb7013bc607d525df2e87cae7d63daae';

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const input = document.getElementById('password').value;
            const hash = await sha256(input);

            if (hash === PASSWORD_HASH) {
                sessionStorage.setItem('ce_auth', 'true');
                window.location.replace('./index.html');
            } else {
                document.getElementById('error-msg').classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
    </script>
</body>
</html>
