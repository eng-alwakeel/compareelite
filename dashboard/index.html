<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CompareElite</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background-color: var(--bg-main);
        }
        
        .dash-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: calc(100vh - var(--header-height));
        }

        .dash-sidebar {
            background: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
        }

        .dash-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .dash-menu a {
            display: block;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            font-weight: 500;
        }

        .dash-menu a:hover, .dash-menu a.active {
            background-color: var(--primary-light);
            color: var(--primary);
            text-decoration: none;
        }

        .dash-content {
            padding: 2rem 3rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg-surface);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .stat-card-title {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-card-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .table-card {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .table-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(248, 250, 252, 0.5);
        }
        
        .table-header h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg-main);
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            padding: 1rem;
            text-align: left;
            text-transform: uppercase;
        }
        
        .dash-header-title {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container header-inner" style="max-width: 100%;">
            <a href="../index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                CompareElite
            </a>
            <div style="font-size: 0.9rem; font-weight: 600; padding: 0.25rem 0.75rem; background: var(--success); color: white; border-radius: 20px;">
                Auto-Sync Active
            </div>
            <nav class="nav-links">
                <a href="../index.html">View Site</a>
                <button class="btn btn-outline" style="padding: 0.4rem 0.6rem; border: none; font-size: 1.2rem;" onclick="toggleTheme()" aria-label="Toggle Dark Mode">🌓</button>
                <a href="#">Logout</a>
            </nav>
        </div>
    </header>

    <div class="dash-layout" id="dashboard-metrics">
        <aside class="dash-sidebar">
            <ul class="dash-menu">
                <li><a href="#" class="active">Overview</a></li>
                <li><a href="#">Traffic</a></li>
                <li><a href="#">Content</a></li>
                <li><a href="#">Affiliate Links</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </aside>

        <main class="dash-content">
            <div class="dash-header-title">
                <h2>Performance Overview</h2>
                <button class="btn btn-primary" onclick="alert('Syncing with GitHub...'); setTimeout(() => location.reload(), 1000);">Trigger GitHub Sync</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-card-title">Total Revenue</div>
                    <div class="stat-card-value" id="dash-revenue"><div class="skeleton" style="width: 100px; height: 35px;"></div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-title">Monthly Traffic</div>
                    <div class="stat-card-value" id="dash-traffic"><div class="skeleton" style="width: 100px; height: 35px;"></div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-title">Total Clicks</div>
                    <div class="stat-card-value" id="dash-clicks"><div class="skeleton" style="width: 100px; height: 35px;"></div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-title">Avg Conversion</div>
                    <div class="stat-card-value" id="dash-conversions" style="color: var(--success);"><div class="skeleton" style="width: 100px; height: 35px;"></div></div>
                </div>
            </div>

            <div class="table-card">
                <div class="table-header">
                    <h3>Top Performing Articles</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th style="padding-left: 1.5rem;">Article Title</th>
                            <th style="text-align: center;">Clicks</th>
                            <th style="text-align: right; padding-right: 1.5rem;">Revenue Generated</th>
                        </tr>
                    </thead>
                    <tbody id="dash-top-articles">
                        <tr>
                            <td colspan="3" style="padding: 2rem; text-align: center;">
                                <div class="skeleton" style="width: 100%; height: 20px; margin-bottom: 10px;"></div>
                                <div class="skeleton" style="width: 100%; height: 20px;"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="../js/github.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
