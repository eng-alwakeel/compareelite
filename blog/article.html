<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | CompareElite</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-inner">
            <a href="../index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                CompareElite
            </a>
            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="index.html" class="active">Guides</a>
                <a href="../dashboard/index.html">Dashboard</a>
                <button class="btn btn-outline" style="padding: 0.4rem 0.6rem; border: none; font-size: 1.2rem;" onclick="toggleTheme()" aria-label="Toggle Dark Mode">🌓</button>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 900px; padding-top: 4rem; padding-bottom: 5rem;">
        
        <div id="article-header" style="text-align: center; margin-bottom: 2rem;">
            <!-- Loading Skeleton -->
            <div class="skeleton" style="width: 100px; height: 30px; border-radius: 20px; margin: 0 auto 1rem;"></div>
            <div class="skeleton" style="width: 80%; height: 50px; margin: 0 auto 1rem;"></div>
            <div class="skeleton" style="width: 50%; height: 20px; margin: 0 auto 2rem;"></div>
            <div class="skeleton" style="width: 100%; height: 400px; border-radius: 12px; margin-bottom: 3rem;"></div>
        </div>

        <article id="article-content">
            <!-- Loading Skeleton for content -->
            <div class="skeleton" style="width: 100%; height: 20px; margin-bottom: 10px;"></div>
            <div class="skeleton" style="width: 100%; height: 20px; margin-bottom: 10px;"></div>
            <div class="skeleton" style="width: 90%; height: 20px; margin-bottom: 30px;"></div>
            
            <div class="skeleton" style="width: 100%; height: 200px; margin-bottom: 30px;"></div>
            
            <div class="skeleton" style="width: 100%; height: 20px; margin-bottom: 10px;"></div>
            <div class="skeleton" style="width: 85%; height: 20px; margin-bottom: 10px;"></div>
        </article>

        <!-- Newsletter CTA inside Article -->
        <div class="newsletter-section" style="margin-top: 5rem;">
            <div class="newsletter-content">
                <h3>Found this guide helpful?</h3>
                <p>Join our newsletter for the latest reviews and exclusive discounts.</p>
                <form class="newsletter-form" onsubmit="event.preventDefault(); alert('Subscribed!');">
                    <input type="email" placeholder="Enter your email" class="input-field" required>
                    <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem;">Subscribe</button>
                </form>
            </div>
        </div>

    </main>

    <footer class="site-footer">
        <div class="container" style="text-align: center; color: var(--text-light);">
            &copy; 2026 CompareElite. All rights reserved.
        </div>
    </footer>

    <script src="../js/github.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
