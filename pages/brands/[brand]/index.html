<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QEREG8GBQF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QEREG8GBQF');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Guides | CompareElite</title>
  <meta name="description" content="Expert buying guides for this brand." id="meta-desc">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://compareelite.com/brands" id="canonical-url">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Brand Guides | CompareElite" id="og-title">
  <meta property="og:description" content="Expert buying guides." id="og-desc">
  <meta property="og:url" content="https://compareelite.com/brands" id="og-url">
  <meta property="og:image" content="https://compareelite.com/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Brand Guides | CompareElite" id="tw-title">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .brand-hub-hero {
      background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
      color: #fff;
      padding: 3.5rem 0 3rem;
      position: relative;
      overflow: hidden;
    }
    .brand-hub-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 75% 50%, rgba(99,99,102,0.25) 0%, transparent 70%);
      pointer-events: none;
    }
    .brand-hub-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .brand-hub-logo {
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .brand-hub-logo img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }
    .brand-hub-hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }
    .brand-hub-hero p {
      color: rgba(255,255,255,0.65);
      font-size: 1rem;
      max-width: 560px;
      line-height: 1.65;
    }
    .brand-stats {
      display: flex;
      gap: 2rem;
      margin-top: 1.75rem;
      flex-wrap: wrap;
    }
    .brand-stat {
      text-align: left;
    }
    .brand-stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      display: block;
      line-height: 1;
    }
    .brand-stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    /* Article cards */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    .article-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: all 0.25s ease;
    }
    .article-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary);
      text-decoration: none;
    }
    .article-card-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: contain;
      background: var(--bg-main);
      padding: 1.5rem;
    }
    .article-card-body {
      padding: 1.1rem 1.25rem 1.25rem;
    }
    .article-card-category {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--primary);
      margin-bottom: 0.4rem;
    }
    .article-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }
    .article-card-date {
      font-size: 0.775rem;
      color: var(--text-secondary);
    }
    .article-card-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.875rem;
      font-size: 0.825rem;
      font-weight: 600;
      color: var(--primary);
    }
    /* Brand about card */
    .brand-about-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 1.75rem;
    }
    .brand-about-card h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.875rem;
    }
    .brand-about-card p {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }
    .brand-meta-chips {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .brand-chip {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      color: var(--text-secondary);
    }
    /* Coming soon state */
    .coming-soon-section {
      text-align: center;
      padding: 5rem 1.5rem;
    }
    .coming-soon-section .cs-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }
    .coming-soon-section h2 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }
    .coming-soon-section p {
      color: var(--text-secondary);
      max-width: 440px;
      margin: 0 auto 1.5rem;
    }
    /* Loading skeleton */
    .hub-skeleton {
      background: linear-gradient(90deg, var(--bg-main) 25%, var(--border-color) 50%, var(--bg-main) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo" aria-label="CompareElite Home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
        CompareElite
      </a>
      <div class="header-actions">
        <button class="btn btn-outline" style="padding:0.4rem 0.6rem;border:none;font-size:1.2rem;" onclick="toggleTheme()" aria-label="Toggle Dark Mode">🌓</button>
        <button class="hamburger" onclick="toggleMenu()" aria-label="Toggle Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
      <nav class="nav-links" id="nav-menu" aria-label="Main navigation">
        <a href="/" onclick="closeMenu()">Home</a>
        <a href="/blog" onclick="closeMenu()">Guides</a>
        <div class="nav-dropdown" id="nav-brands-dropdown">
          <button class="nav-dropdown-trigger" onclick="toggleDropdown('nav-brands-dropdown')" aria-expanded="false" aria-haspopup="true">
            Brands <span class="nav-caret" aria-hidden="true">▾</span>
          </button>
          <div class="nav-dropdown-menu" role="menu">
            <a href="/brands/apple" onclick="closeMenu()" role="menuitem">🍎 Apple</a>
            <a href="/brands/samsung" onclick="closeMenu()" role="menuitem">📱 Samsung</a>
            <a href="/brands/sony" onclick="closeMenu()" role="menuitem">🎵 Sony</a>
            <a href="/brands/dyson" onclick="closeMenu()" role="menuitem">🌀 Dyson</a>
            <a href="/brands/herman-miller" onclick="closeMenu()" role="menuitem">🪑 Herman Miller</a>
            <a href="/brands/nordictrack" onclick="closeMenu()" role="menuitem">🏃 NordicTrack</a>
            <div class="dropdown-divider"></div>
            <a href="/brands" onclick="closeMenu()" class="dropdown-all-link" role="menuitem">All Brands →</a>
          </div>
        </div>
        <a href="/blog" class="btn btn-primary" onclick="closeMenu()">All Guides</a>
      </nav>
    </div>
  </header>

  <!-- Breadcrumb -->
  <nav aria-label="Breadcrumb" style="background:var(--bg-surface);border-bottom:1px solid var(--border-color);padding:0.75rem 0;">
    <div class="container">
      <ol style="list-style:none;display:flex;gap:0.5rem;font-size:0.875rem;flex-wrap:wrap;">
        <li><a href="/" style="color:var(--primary);">Home</a></li>
        <li style="opacity:0.5;">/</li>
        <li><a href="/brands" style="color:var(--primary);">Brand Hub</a></li>
        <li style="opacity:0.5;">/</li>
        <li id="breadcrumb-brand" style="color:var(--text-secondary);">Loading…</li>
      </ol>
    </div>
  </nav>

  <main id="brand-hub-main">
    <!-- Loading skeleton -->
    <div id="hub-skeleton">
      <div style="background:linear-gradient(135deg,#1c1c1e,#2c2c2e);padding:3.5rem 0 3rem;">
        <div class="container">
          <div class="hub-skeleton" style="height:18px;width:80px;margin-bottom:1.25rem;"></div>
          <div class="hub-skeleton" style="height:38px;width:55%;margin-bottom:0.75rem;"></div>
          <div class="hub-skeleton" style="height:18px;width:70%;margin-bottom:0.5rem;"></div>
          <div class="hub-skeleton" style="height:18px;width:50%;"></div>
        </div>
      </div>
      <div class="container" style="padding-top:3rem;">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;">
          <div class="hub-skeleton" style="height:280px;border-radius:14px;"></div>
          <div class="hub-skeleton" style="height:280px;border-radius:14px;"></div>
          <div class="hub-skeleton" style="height:280px;border-radius:14px;"></div>
        </div>
      </div>
    </div>
    <!-- Rendered content injected here -->
    <div id="hub-content" style="display:none;"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        &copy; 2026 CompareElite. All rights reserved. |
        <a href="/affiliate-disclosure" style="color:var(--text-light);">Affiliate Disclosure</a>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
  (function () {
    'use strict';

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function getBrandFromPath() {
      const parts = window.location.pathname.replace(/\/$/,'').split('/');
      return parts[parts.length - 1] || null;
    }

    // Known brand metadata for "coming soon" brands not in brands/index.json
    const BRAND_META = {
      apple:         { name: 'Apple',         logo: 'https://logo.clearbit.com/apple.com',         tagline: 'Think Different',          founded: 1976, country: 'USA' },
      samsung:       { name: 'Samsung',        logo: 'https://logo.clearbit.com/samsung.com',        tagline: 'Do What You Can\'t',        founded: 1938, country: 'South Korea' },
      sony:          { name: 'Sony',           logo: 'https://logo.clearbit.com/sony.com',           tagline: 'Be Moved',                  founded: 1946, country: 'Japan' },
      dyson:         { name: 'Dyson',          logo: 'https://logo.clearbit.com/dyson.com',          tagline: 'Solve Problems Others Ignore', founded: 1991, country: 'UK' },
      'herman-miller': { name: 'Herman Miller', logo: 'https://logo.clearbit.com/hermanmiller.com',  tagline: 'Design for the Good of Humankind', founded: 1905, country: 'USA' },
      nordictrack:   { name: 'NordicTrack',    logo: 'https://logo.clearbit.com/nordictrack.com',    tagline: 'Go Further',                founded: 1975, country: 'USA' },
    };

    async function init() {
      const brandSlug = getBrandFromPath();
      if (!brandSlug || brandSlug === 'brands') {
        window.location.href = '/brands';
        return;
      }

      let index;
      try {
        const res = await fetch('/brands/index.json');
        index = await res.json();
      } catch (e) {
        renderError('Could not load brands data.');
        return;
      }

      const brandInfo = (index.brands || []).find(b => b.slug === brandSlug);
      const articles  = (index.articles || []).filter(a => a.brand === brandSlug);
      const meta      = BRAND_META[brandSlug] || { name: brandSlug, logo: '', tagline: '' };
      const resolved  = brandInfo ? { ...meta, ...brandInfo } : meta;

      render(brandSlug, resolved, articles);
    }

    function render(slug, brand, articles) {
      // Update page meta
      const title = `${brand.name} Guides | CompareElite`;
      document.title = title;
      ['og-title','tw-title'].forEach(id => { const m=document.getElementById(id); if(m) m.setAttribute('content',title); });
      const desc = `Expert buying guides for ${brand.name} products — tested and ranked by CompareElite.`;
      ['meta-desc','og-desc'].forEach(id => { const m=document.getElementById(id); if(m) m.setAttribute('content',desc); });
      const url = `https://compareelite.com/brands/${slug}`;
      ['canonical-url','og-url'].forEach(id => { const m=document.getElementById(id); if(m) m.setAttribute('content',url); });

      const bc = document.getElementById('breadcrumb-brand');
      if (bc) bc.textContent = brand.name || slug;

      // Build content HTML
      let html = buildHero(brand, articles);

      if (articles.length === 0) {
        html += buildComingSoon(brand);
      } else {
        html += `<div class="container" style="padding:3rem 0 5rem;">
          <div style="display:grid;grid-template-columns:1fr;gap:3rem;">
            <div>
              <h2 style="font-size:0.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:1.5rem;">
                ${escHtml(articles.length)} Guide${articles.length !== 1 ? 's' : ''}
              </h2>
              <div class="articles-grid">${articles.map(buildArticleCard).join('')}</div>
            </div>
            ${brand.description ? buildAboutCard(brand) : ''}
          </div>
        </div>`;
      }

      const content = document.getElementById('hub-content');
      if (content) { content.innerHTML = html; content.style.display = ''; }
      const skeleton = document.getElementById('hub-skeleton');
      if (skeleton) skeleton.remove();
    }

    function buildHero(brand, articles) {
      const logoHtml = brand.logo
        ? `<img src="${escHtml(brand.logo)}" alt="${escHtml(brand.name)} logo" onerror="this.parentNode.innerHTML=''" style="width:34px;height:34px;object-fit:contain;filter:brightness(0) invert(1);">`
        : '';
      return `
        <section class="brand-hub-hero">
          <div class="container" style="position:relative;z-index:1;">
            <div class="brand-hub-meta">
              <div class="brand-hub-logo">${logoHtml}</div>
              <div>
                <div style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);">Brand Hub</div>
                ${brand.tagline ? `<div style="font-size:.85rem;color:rgba(255,255,255,.5);font-style:italic;">${escHtml(brand.tagline)}</div>` : ''}
              </div>
            </div>
            <h1 style="font-size:clamp(1.6rem,4vw,2.5rem);font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:.6rem;">
              ${escHtml(brand.name)} Buying Guides
            </h1>
            <p style="color:rgba(255,255,255,.65);font-size:1rem;max-width:560px;line-height:1.65;">
              Expert, unbiased reviews of every ${escHtml(brand.name)} product — tested by our team and ranked for every budget.
            </p>
            <div class="brand-stats">
              <div class="brand-stat">
                <span class="brand-stat-value">${articles.length}</span>
                <span class="brand-stat-label">Guide${articles.length !== 1 ? 's' : ''}</span>
              </div>
              ${brand.founded ? `<div class="brand-stat"><span class="brand-stat-value">${escHtml(String(brand.founded))}</span><span class="brand-stat-label">Founded</span></div>` : ''}
              ${brand.country ? `<div class="brand-stat"><span class="brand-stat-value">${escHtml(brand.country)}</span><span class="brand-stat-label">Country</span></div>` : ''}
            </div>
          </div>
        </section>
      `;
    }

    function buildArticleCard(article) {
      const url = `/brand/${escHtml(article.slug)}`;
      const img = article.thumbnail
        ? `<img class="article-card-img" src="${escHtml(article.thumbnail)}" alt="${escHtml(article.title)}" loading="lazy">`
        : `<div class="article-card-img" style="display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:.85rem;">No image</div>`;
      return `
        <a class="article-card" href="${url}">
          ${img}
          <div class="article-card-body">
            <div class="article-card-category">${escHtml(article.category || 'Guide')}</div>
            <div class="article-card-title">${escHtml(article.title || article.slug)}</div>
            ${article.date ? `<div class="article-card-date">${escHtml(article.date)}</div>` : ''}
            <div class="article-card-cta">Read Guide <span aria-hidden="true">→</span></div>
          </div>
        </a>
      `;
    }

    function buildAboutCard(brand) {
      return `
        <div>
          <div class="brand-about-card">
            <h3>About ${escHtml(brand.name)}</h3>
            <p>${escHtml(brand.description)}</p>
            <div class="brand-meta-chips">
              ${brand.founded ? `<span class="brand-chip">📅 Founded ${escHtml(String(brand.founded))}</span>` : ''}
              ${brand.country ? `<span class="brand-chip">🌍 ${escHtml(brand.country)}</span>` : ''}
              ${brand.official_url ? `<span class="brand-chip"><a href="${escHtml(brand.official_url)}" target="_blank" rel="noopener nofollow" style="color:inherit;">🔗 Official Site</a></span>` : ''}
            </div>
          </div>
          <div style="margin-top:1rem;">
            <a href="/brands" style="font-size:.85rem;font-weight:600;color:var(--primary);">← All Brands</a>
          </div>
        </div>
      `;
    }

    function buildComingSoon(brand) {
      return `
        <div class="container">
          <div class="coming-soon-section">
            <div class="cs-icon">🔜</div>
            <h2>${escHtml(brand.name)} Guides Coming Soon</h2>
            <p>Our team is currently testing and reviewing ${escHtml(brand.name)} products. Check back soon for expert, unbiased rankings.</p>
            <a href="/brands" class="btn btn-primary" style="padding:.75rem 2rem;">Browse Available Brands</a>
          </div>
        </div>
      `;
    }

    function renderError(msg) {
      const skeleton = document.getElementById('hub-skeleton');
      if (skeleton) skeleton.remove();
      const main = document.getElementById('brand-hub-main');
      if (main) main.innerHTML = `<div class="container" style="padding:5rem 1.5rem;text-align:center;">
        <h2 style="color:var(--text-primary);margin-bottom:1rem;">Brand not found</h2>
        <p style="color:var(--text-secondary);">${escHtml(msg)}</p>
        <a href="/brands" class="btn btn-primary" style="margin-top:1.5rem;display:inline-block;">← All Brands</a>
      </div>`;
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
</html>
